name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  rust-ci:
    name: Rust CI
    uses: ./.github/workflows/rust-ci.yml

  python-ci:
    name: Python CI
    uses: ./.github/workflows/python-ci.yml

  security-scan:
    name: Security Scan
    uses: ./.github/workflows/security-scan.yml